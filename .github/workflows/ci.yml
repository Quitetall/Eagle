name: ci

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pytest:
    name: Pytest — benchmarks + validation + audits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pyedflib mne
      - name: Run pytest (Lossless-independent subset)
        run: |
          # Tests that don't require sibling-cloned LamQuant-Lossless wheel.
          # Coverage-dep tests gate via importorskip("lamquant_codec").
          pytest tests/ -v --tb=short

  eagle-rust:
    name: Eagle crate — build + test (sibling LQS) (fast gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          path: Eagle
      # Eagle's `eagle` crate depends on the vendor-neutral LQS standard
      # (github.com/Quitetall/LQS) via a sibling-clone path dep
      # (eagle/Cargo.toml: lqs = { path = "../../LQS" }). Check it out
      # next to Eagle so the path resolves. Token needed while LQS is
      # private; drop once LQS is public + pinned via crates.io.
      - name: Checkout sibling LQS
        uses: actions/checkout@v4
        with:
          repository: Quitetall/LQS
          token: ${{ secrets.LQS_TOKEN }}
          path: LQS
        continue-on-error: true   # advisory until LQS_TOKEN configured / LQS public
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            Eagle/target
          key: eagle-cargo-${{ runner.os }}-${{ hashFiles('Eagle/Cargo.lock') }}
          restore-keys: |
            eagle-cargo-${{ runner.os }}-
      - name: cargo build -p eagle
        working-directory: Eagle
        run: cargo build -p eagle
      - name: cargo test -p eagle
        working-directory: Eagle
        run: cargo test -p eagle
      - name: cargo fmt -p eagle --check (advisory)
        working-directory: Eagle
        run: cargo fmt -p eagle -- --check
        continue-on-error: true

  hazard3-bench-check:
    name: hazard3_bench cargo check (sibling-clone Lossless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # Advisory until LamQuant-Lossless flips PUBLIC
    steps:
      - uses: actions/checkout@v4
        with:
          path: Eagle
      - name: Checkout sibling LamQuant-Lossless
        uses: actions/checkout@v4
        with:
          repository: Quitetall/LamQuant-Lossless
          token: ${{ secrets.LAMQUANT_LOSSLESS_TOKEN }}
          path: LamQuant-Lossless
        # Will skip with continue-on-error: true if secret not configured.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - name: cargo check hazard3_bench
        working-directory: Eagle/tools/hazard3_bench
        run: cargo check --target riscv32imac-unknown-none-elf
