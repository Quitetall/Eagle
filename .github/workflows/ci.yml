name: ci

on:
  push:
    branches: [main, "feat/**", "fix/**"]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  pytest:
    name: Pytest — benchmarks + validation + audits
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install Python deps
        run: |
          pip install --upgrade pip
          pip install pytest numpy pyedflib mne
      - name: Run pytest (Lossless-independent subset)
        run: |
          # Tests that don't require sibling-cloned LamQuant-Lossless wheel.
          # Coverage-dep tests gate via importorskip("lamquant_codec").
          pytest tests/ -v --tb=short

  lqs-rust:
    name: LQS Rust crate — build + test + smoke (fast gate)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      # NOTE: lqs is a member of the repo-root Cargo workspace
      # (Cargo.toml: members = ["lqs"]). The lockfile and build dir
      # therefore live at the repo root — there is no lqs/Cargo.lock or
      # lqs/target. We cache the workspace lock + root target/ so the key
      # is real. No --all-features: the optional `zstd` feature pulls a
      # system dependency we deliberately avoid (the keep-CI-fast point).
      - name: Cache cargo + target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: lqs-cargo-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            lqs-cargo-${{ runner.os }}-
      - name: cargo build -p lqs
        run: cargo build -p lqs --locked
      - name: cargo test -p lqs
        run: cargo test -p lqs --locked
      - name: Smoke — eagle-lqs store (must exit 0)
        run: cargo run -q -p lqs --bin eagle-lqs -- store
      - name: cargo fmt -p lqs --check (advisory)
        run: cargo fmt -p lqs -- --check
        continue-on-error: true

  hazard3-bench-check:
    name: hazard3_bench cargo check (sibling-clone Lossless)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true   # Advisory until LamQuant-Lossless flips PUBLIC
    steps:
      - uses: actions/checkout@v4
        with:
          path: Eagle
      - name: Checkout sibling LamQuant-Lossless
        uses: actions/checkout@v4
        with:
          repository: Quitetall/LamQuant-Lossless
          token: ${{ secrets.LAMQUANT_LOSSLESS_TOKEN }}
          path: LamQuant-Lossless
        # Will skip with continue-on-error: true if secret not configured.
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: riscv32imac-unknown-none-elf
      - name: cargo check hazard3_bench
        working-directory: Eagle/tools/hazard3_bench
        run: cargo check --target riscv32imac-unknown-none-elf
